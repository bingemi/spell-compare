<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liminal Locations</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">

  <nav class="nav-bar">
    <a class="nav-link" href="index.html"><i class="ti ti-wand" aria-hidden="true"></i>Missing Spells</a>
    <a class="nav-link active" href="liminal.html"><i class="ti ti-map-pin" aria-hidden="true"></i>Liminal Locations</a>
    <a class="nav-link" href="aa-tracker.html"><i class="ti ti-arrow-up-circle" aria-hidden="true"></i>AA Tracker</a>
  </nav>

  <h1><i class="ti ti-map-pin" aria-hidden="true" style="font-size:20px;vertical-align:-2px;margin-right:6px"></i>Liminal Locations</h1>
  <p class="subtitle">Discover where Liminal is hiding</p>
  <div id="liminalContent"></div>

</div>
<script>
function loadLiminalLocations() {
  const el = document.getElementById('liminalContent');
  if (el.dataset.loaded) return;
  fetch('liminal-reference/liminal-locations.json')
    .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(data => {
      el.innerHTML = Object.entries(data).map(([zone, locations]) =>
        `<div class="card">
          <div class="exp-group-name">${zone}</div>
          ${locations.map(l => `<div class="spell-row"><span class="spell-name">${l}</span></div>`).join('')}
        </div>`
      ).join('');
      el.dataset.loaded = '1';
    })
    .catch(err => { el.innerHTML = '<div class="card"><p class="no-issues">Failed to load: ' + err.message + '</p></div>'; });
}
loadLiminalLocations();
</script>
</body>
</html>
