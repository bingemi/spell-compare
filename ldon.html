<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LDoN Gear</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<link rel="stylesheet" href="style.css">
<style>
.filters { display:flex; flex-direction:column; gap:12px; }
.filter-row { display:flex; align-items:center; gap:8px; flex-wrap:wrap; }
.filter-label { font-size:11px; font-weight:500; color:var(--text2); text-transform:uppercase; letter-spacing:.05em; min-width:40px; }
.search-input { flex:1; min-width:160px; padding:7px 10px; font-size:13px; font-family:var(--font); border:0.5px solid var(--border2); border-radius:var(--radius-md); background:var(--bg2); color:var(--text); outline:none; }
.search-input:focus { border-color:var(--info-border); }
.cost-input { width:80px; padding:7px 8px; font-size:13px; font-family:var(--font); border:0.5px solid var(--border2); border-radius:var(--radius-md); background:var(--bg2); color:var(--text); outline:none; }
.cost-input:focus { border-color:var(--info-border); }
.cost-sep { color:var(--text3); font-size:13px; }
.results-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
.result-count { font-size:13px; color:var(--text2); }
.ldon-table { width:100%; border-collapse:collapse; font-size:13px; }
.ldon-table th { font-size:11px; font-weight:500; color:var(--text2); text-transform:uppercase; letter-spacing:.05em; text-align:left; padding:6px 8px; border-bottom:0.5px solid var(--border); white-space:nowrap; cursor:pointer; user-select:none; }
.ldon-table th:hover { color:var(--text); }
.ldon-table th .sort-arrow { font-size:10px; margin-left:3px; }
.ldon-table th .sort-arrow.dim { opacity:0.25; }
.ldon-table td { padding:8px; border-bottom:0.5px solid var(--border); vertical-align:top; }
.ldon-table tr:last-child td { border-bottom:none; }
.ldon-table td a { color:inherit; text-decoration:none; }
.ldon-table td a:hover { text-decoration:underline; }
.stats-cell { font-size:11px; color:var(--text2); line-height:1.5; }
.stat-val { color:var(--text); }
.class-cell { font-size:11px; }
.slot-badge, .aug-badge, .type-badge { display:inline-block; font-size:10px; padding:1px 6px; border-radius:4px; font-weight:500; white-space:nowrap; }
.type-badge-item { background:#e8f0fe; color:#1a5c9e; }
.type-badge-spell { background:#f0e6ff; color:#6b2d9e; }
.aug-badge-yes { background:#e6f7e6; color:#2d7d2d; }
.aug-badge { background:var(--bg2); color:var(--text3); }
.slot-chip { font-size:10px; padding:1px 5px; border-radius:3px; background:var(--bg2); color:var(--text2); }
.lore-badge { display:inline-block; font-size:9px; padding:1px 5px; border-radius:3px; background:#fde8e8; color:#9e2d2d; font-weight:500; }
.notrade-badge { display:inline-block; font-size:9px; padding:1px 5px; border-radius:3px; background:#fff3e0; color:#9e6b1a; font-weight:500; }
@media (prefers-color-scheme:dark) {
  .type-badge-item { background:#1a2a3a; color:#7dabcc; }
  .type-badge-spell { background:#2a1a3a; color:#ab7dcc; }
  .aug-badge-yes { background:#1a3a1a; color:#7dcc7d; }
  .lore-badge { background:#3a1a1a; color:#cc7d7d; }
  .notrade-badge { background:#3a2a1a; color:#cc9e5c; }
}
</style>
</head>
<body>
<div class="container">

  <nav class="nav-bar">
    <a class="nav-link" href="index.html"><i class="ti ti-wand" aria-hidden="true"></i>Missing Spells</a>
    <a class="nav-link" href="aa-tracker.html"><i class="ti ti-arrow-up-circle" aria-hidden="true"></i>AA Tracker</a>
    <a class="nav-link" href="froggy.html"><i class="ti ti-map-pin" aria-hidden="true"></i>Froggy Locations</a>
    <a class="nav-link" href="augments.html"><i class="ti ti-diamond" aria-hidden="true"></i>Augments</a>
    <a class="nav-link" href="attack-cap.html"><i class="ti ti-sword" aria-hidden="true"></i>Attack Cap</a>
    <a class="nav-link" href="raid-targets.html"><i class="ti ti-skull" aria-hidden="true"></i>Raid Targets</a>
    <a class="nav-link active" href="ldon.html"><i class="ti ti-backpack" aria-hidden="true"></i>LDoN Gear</a>
  </nav>

  <h1><i class="ti ti-backpack" aria-hidden="true" style="font-size:20px;vertical-align:-2px;margin-right:6px"></i>LDoN Gear</h1>
  <p class="subtitle">Lost Dungeons of Norrath adventure rewards</p>

  <div class="card">
    <div class="panel-section">
      <div class="filters" id="filters"></div>
    </div>
  </div>

  <div class="card" id="resultsCard">
    <div class="panel-section">
      <div class="results-header">
        <span class="result-count" id="resultCount"></span>
      </div>
      <div id="ldonContent"></div>
    </div>
  </div>

</div>

<script>
fetch('reference/ldon/ldon-gear.json')
  .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
  .then(data => {
    const ALL_CLASSES = ['All','War','Clr','Pal','Rng','Shd','Dru','Mnk','Brd','Rog','Ber','Bst','Nec','Wiz','Mag','Enc','Shm'];
    const ALL_SLOTS = ['All','Chest','Feet','Finger','Head','Wrist','Waist','Arm','Leg','Hand','Ear','Face','Neck','Shoulder','Back','Range','Primary','Secondary'];
    const ALL_DUNGEONS = ['All','Guk','Mir','Mmc','Ruj','Tak'];
    const ALL_AUGS = ['All','None','Aug2','Aug3','Aug4','Aug6','Aug7','Aug8'];

    function getItemType(item) {
      return item.name.startsWith('Spell:') ? 'spell' : 'item';
    }

    function normalizeStats(raw) {
      if (!raw) return {};
      const s = {...raw};
      if (s.Hp != null && s.HP == null) { s.HP = s.Hp; }
      delete s.Hp;
      if (s.DMG != null && s.Dmg == null) { s.Dmg = s.DMG; }
      delete s.DMG;
      if (s.AGI != null && s.Agi == null) { s.Agi = s.AGI; }
      delete s.AGI;
      if (s.Smg != null) delete s.Smg;
      if (s.Ag != null && s.Agi == null) { s.Agi = s.Ag; }
      delete s.Ag;
      if (s.Afi != null) delete s.Afi;
      if (s.ta != null) delete s.ta;
      if (s.CRC != null && s.CR == null) { s.CR = s.CRC; }
      delete s.CRC;
      if (s.PosionDMG != null && s.PoisonDMG == null) { s.PoisonDMG = s.PosionDMG; }
      delete s.PosionDMG;
      if (s.Restictions != null && s.Restrictions == null) { s.Restrictions = s.Restictions; }
      delete s.Restictions;
      if (s.Restriction != null && s.Restrictions == null) { s.Restrictions = s.Restriction; }
      delete s.Restriction;
      if (s.Rng != null && s.Range == null) { s.Range = s.Rng; }
      delete s.Rng;
      if (s.MinDly != null && s.MinDelay == null) { s.MinDelay = s.MinDly; }
      if (s.SvF != null && s.FR == null) { s.FR = s.SvF; }
      delete s.SvF;
      if (s.DisDMG != null && s.DiseaseDMG == null) { s.DiseaseDMG = s.DisDMG; }
      delete s.DisDMG;
      if (s.FireDmg != null && s.FireDMG == null) { s.FireDMG = s.FireDmg; }
      delete s.FireDmg;
      if (s.ColdDmg != null && s.ColdDMG == null) { s.ColdDMG = s.ColdDmg; }
      delete s.ColdDmg;
      return s;
    }

    const STAT_ORDER = [
      'AC', 'Str', 'Dex', 'Sta', 'Cha', 'Wis', 'Int', 'Agi',
      'HP', 'Mana',
      'FR', 'CR', 'MR', 'DR', 'PR',
      'Dmg', 'Dly', 'Wgt',
      'Range', 'SkillMod', 'MinDelay', 'BaneDmg',
      'FireDMG', 'ColdDMG', 'PoisonDMG', 'DiseaseDMG',
    ];

    function cleanName(name) {
      let n = name;
      if (n.includes('Lore,')) n = n.substring(0, n.indexOf('Lore,'));
      if (n.includes('Notlore,')) n = n.substring(0, n.indexOf('Notlore,'));
      return n.replace(/,?\s*$/, '').trim();
    }

    let filters = {
      search: '',
      dungeon: 'All',
      type: 'All',
      classes: [],
      slots: [],
      aug: 'All',
      costMin: '',
      costMax: ''
    };

    let sortBy = 'cost';
    let sortDir = 'desc';

    function getSortVal(item) {
      switch (sortBy) {
        case 'name': return cleanName(item.name).toLowerCase();
        case 'dungeon': return item.dungeon || '';
        case 'cost': return item.cost ?? -1;
        case 'type': return getItemType(item);
        case 'classes': return (item.classes || []).join(', ');
        case 'slots': return (item.slots || []).join(', ');
        case 'aug': return item.aug || '';
        default: return '';
      }
    }

    function sortData(items) {
      const sorted = [...items];
      sorted.sort((a, b) => {
        const va = getSortVal(a);
        const vb = getSortVal(b);
        if (va < vb) return sortDir === 'asc' ? -1 : 1;
        if (va > vb) return sortDir === 'asc' ? 1 : -1;
        return 0;
      });
      return sorted;
    }

    function matches(item) {
      if (filters.search) {
        const q = filters.search.toLowerCase();
        if (!item.name.toLowerCase().includes(q)) return false;
      }
      if (filters.dungeon !== 'All' && item.dungeon !== filters.dungeon) return false;
      if (filters.type !== 'All' && getItemType(item) !== filters.type) return false;
      if (filters.classes.length > 0) {
        const itemClasses = item.classes || [];
        if (itemClasses.includes('All')) { /* matches any class filter */ }
        else if (!filters.classes.some(c => itemClasses.includes(c))) return false;
      }
      if (filters.slots.length > 0) {
        const itemSlots = item.slots || [];
        if (!filters.slots.some(s => itemSlots.includes(s))) return false;
      }
      if (filters.aug !== 'All') {
        const itemAug = item.aug || 'None';
        if (filters.aug === 'None' && itemAug !== 'None') return false;
        if (filters.aug !== 'None' && itemAug !== filters.aug) return false;
      }
      if (filters.costMin !== '') {
        if ((item.cost ?? 0) < parseInt(filters.costMin)) return false;
      }
      if (filters.costMax !== '') {
        if ((item.cost ?? 0) > parseInt(filters.costMax)) return false;
      }
      return true;
    }

    function esc(s) {
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    function formatStats(item) {
      if (getItemType(item) === 'spell' || !item.stats) return '';
      const stats = normalizeStats(item.stats);
      const parts = [];
      if (stats.Type) {
        parts.push('<span class="stat-val">' + esc(stats.Type) + '</span>');
      }
      for (const key of STAT_ORDER) {
        if (stats[key] != null && stats[key] !== 0 && stats[key] !== '') {
          parts.push(key + ' <span class="stat-val">' + esc(String(stats[key])) + '</span>');
        }
      }
      if (stats.Mod) {
        parts.push('Mod: <span class="stat-val">' + esc(stats.Mod) + '</span>');
      }
      return parts.join(' &middot; ');
    }

    const SORT_COLS = ['name','dungeon','cost','type','classes','slots','aug'];

    function thHtml(key, label) {
      const active = sortBy === key;
      const arrow = active ? (sortDir === 'asc' ? '&#9650;' : '&#9660;') : '&#9650;';
      const dim = active ? '' : ' dim';
      return '<th data-sort="' + key + '">' + label + '<span class="sort-arrow' + dim + '">' + arrow + '</span></th>';
    }

    function render() {
      const filtered = sortData(data.filter(matches));
      const count = document.getElementById('resultCount');
      count.textContent = filtered.length + ' / ' + data.length + ' items';

      const container = document.getElementById('ldonContent');
      if (filtered.length === 0) {
        container.innerHTML = '<p class="aa-empty">No items match the selected filters.</p>';
        return;
      }

      let html = '<table class="ldon-table" id="ldonTable"><thead><tr>' +
        thHtml('name', 'Name') + thHtml('dungeon', 'Dungeon') + thHtml('cost', 'Cost') + thHtml('type', 'Type') +
        thHtml('classes', 'Classes') + thHtml('slots', 'Slots') + thHtml('aug', 'Aug') +
        '<th>Stats</th>' +
        '</tr></thead><tbody>';

      filtered.forEach(item => {
        const classes = (item.classes || []).join(', ');
        const slots = (item.slots || []).join(', ');
        const isItem = getItemType(item) === 'item';
        const isSpell = getItemType(item) === 'spell';
        const augLabel = item.aug ? '<span class="aug-badge-yes">' + esc(item.aug) + '</span>' : '<span class="aug-badge">&mdash;</span>';

        const hasLore = item.name.includes('Lore,');
        const displayName = cleanName(item.name);
        let nameHtml = esc(displayName);

        let flagsHtml = '';
        if (isItem) {
          if (hasLore) flagsHtml += '<span class="lore-badge">LORE</span> ';
        }

        const stats = item.stats || {};
        let extraHtml = '';
        if (stats.Effect) extraHtml += '<div style="font-size:11px;color:var(--warning-text);margin-top:2px">Effect: ' + esc(stats.Effect) + '</div>';
        if (stats.Restrictions) extraHtml += '<div style="font-size:10px;color:var(--text3)">' + esc(stats.Restrictions) + '</div>';

        let statsHtml = '';
        if (isItem) {
          statsHtml = '<div class="stats-cell">';
          const formatted = formatStats(item);
          if (formatted) statsHtml += formatted;
          const augSlots = stats['Augment Slots'];
          if (augSlots && augSlots.length) {
            statsHtml += '<div style="margin-top:2px;font-size:10px;color:var(--text3)">Aug slots: ' + augSlots.join(', ') + '</div>';
          }
          statsHtml += '</div>';
        } else {
          statsHtml = '<span style="color:var(--text3);font-size:11px">' + (item.classes || []).join(', ') + '</span>';
        }

        html += '<tr>' +
          '<td><strong>' + nameHtml + '</strong>' + flagsHtml + extraHtml + '</td>' +
          '<td>' + esc(item.dungeon) + '</td>' +
          '<td>' + (item.cost ?? '&mdash;') + '</td>' +
          '<td><span class="type-badge ' + (isItem ? 'type-badge-item' : 'type-badge-spell') + '">' + (isItem ? 'Item' : 'Spell') + '</span></td>' +
          '<td class="class-cell">' + esc(classes) + '</td>' +
          '<td style="font-size:11px">' + esc(slots) + '</td>' +
          '<td>' + augLabel + '</td>' +
          '<td>' + statsHtml + '</td>' +
          '</tr>';
      });

      html += '</tbody></table>';
      container.innerHTML = html;

      const table = document.getElementById('ldonTable');
      table.onclick = function(e) {
        const th = e.target.closest('th');
        if (!th || !th.dataset.sort) return;
        const key = th.dataset.sort;
        if (sortBy === key) {
          sortDir = sortDir === 'asc' ? 'desc' : 'asc';
        } else {
          sortBy = key;
          sortDir = 'asc';
        }
        render();
      };
    }

    function renderChips(container, opts, current, onChange) {
      const div = document.createElement('div');
      div.className = 'exp-chips';
      opts.forEach(val => {
        const span = document.createElement('span');
        span.className = 'chip' + (val === current ? ' active' : '');
        span.textContent = val;
        span.onclick = () => { onChange(val); };
        div.appendChild(span);
      });
      container.innerHTML = '';
      container.appendChild(div);
    }

    function renderMultiChips(container, opts, selected, onChange) {
      const div = document.createElement('div');
      div.className = 'exp-chips';
      opts.forEach(val => {
        const span = document.createElement('span');
        span.className = 'chip' + (selected.includes(val) ? ' active' : '');
        span.textContent = val;
        span.onclick = () => {
          if (val === 'All') {
            onChange([]);
          } else {
            const idx = selected.indexOf(val);
            const next = idx === -1 ? [...selected, val] : selected.filter(x => x !== val);
            onChange(next);
          }
        };
        div.appendChild(span);
      });
      container.innerHTML = '';
      container.appendChild(div);
    }

    function rebuildFilters() {
      renderChips(dunChips, ALL_DUNGEONS, filters.dungeon, v => { filters.dungeon = v; rebuildFilters(); render(); });
      renderChips(typeChips, ['All','item','spell'], filters.type, v => { filters.type = v; rebuildFilters(); render(); });
      renderMultiChips(clsChips, ALL_CLASSES, filters.classes, v => { filters.classes = v; rebuildFilters(); render(); });
      renderMultiChips(slotChips, ALL_SLOTS, filters.slots, v => { filters.slots = v; rebuildFilters(); render(); });
      renderChips(augChips, ALL_AUGS, filters.aug, v => { filters.aug = v; rebuildFilters(); render(); });
    }

    let dunChips, typeChips, clsChips, slotChips, augChips;
    let searchInput, costMin, costMax;

    function resetFilters() {
      filters.search = '';
      filters.dungeon = 'All';
      filters.type = 'All';
      filters.classes = [];
      filters.slots = [];
      filters.aug = 'All';
      filters.costMin = '';
      filters.costMax = '';
      sortBy = 'cost';
      sortDir = 'desc';
      searchInput.value = '';
      costMin.value = '';
      costMax.value = '';
      rebuildFilters();
      render();
    }

    function setupFilters() {
      const container = document.getElementById('filters');

      // Search + Reset row
      const topRow = document.createElement('div');
      topRow.className = 'filter-row';
      searchInput = document.createElement('input');
      searchInput.type = 'text';
      searchInput.className = 'search-input';
      searchInput.placeholder = 'Search by name...';
      searchInput.oninput = () => { filters.search = searchInput.value; render(); };
      topRow.appendChild(searchInput);
      const resetBtn = document.createElement('button');
      resetBtn.className = 'aa-btn';
      resetBtn.innerHTML = '<i class="ti ti-refresh" style="font-size:14px;vertical-align:-1px;margin-right:3px"></i>Reset';
      resetBtn.onclick = resetFilters;
      topRow.appendChild(resetBtn);
      container.appendChild(topRow);

      // Dungeon
      const dunRow = document.createElement('div');
      dunRow.className = 'filter-row';
      const dunLabel = document.createElement('span');
      dunLabel.className = 'filter-label';
      dunLabel.textContent = 'Dungeon';
      dunRow.appendChild(dunLabel);
      dunChips = document.createElement('div');
      dunChips.className = 'exp-chips';
      dunRow.appendChild(dunChips);
      container.appendChild(dunRow);

      // Type
      const typeRow = document.createElement('div');
      typeRow.className = 'filter-row';
      const typeLabel = document.createElement('span');
      typeLabel.className = 'filter-label';
      typeLabel.textContent = 'Type';
      typeRow.appendChild(typeLabel);
      typeChips = document.createElement('div');
      typeChips.className = 'exp-chips';
      typeRow.appendChild(typeChips);
      container.appendChild(typeRow);

      // Class
      const clsRow = document.createElement('div');
      clsRow.className = 'filter-row';
      const clsLabel = document.createElement('span');
      clsLabel.className = 'filter-label';
      clsLabel.textContent = 'Class';
      clsRow.appendChild(clsLabel);
      clsChips = document.createElement('div');
      clsChips.className = 'exp-chips';
      clsRow.appendChild(clsChips);
      container.appendChild(clsRow);

      // Slot
      const slotRow = document.createElement('div');
      slotRow.className = 'filter-row';
      const slotLabel = document.createElement('span');
      slotLabel.className = 'filter-label';
      slotLabel.textContent = 'Slot';
      slotRow.appendChild(slotLabel);
      slotChips = document.createElement('div');
      slotChips.className = 'exp-chips';
      slotRow.appendChild(slotChips);
      container.appendChild(slotRow);

      // Aug
      const augRow = document.createElement('div');
      augRow.className = 'filter-row';
      const augLabel = document.createElement('span');
      augLabel.className = 'filter-label';
      augLabel.textContent = 'Aug';
      augRow.appendChild(augLabel);
      augChips = document.createElement('div');
      augChips.className = 'exp-chips';
      augRow.appendChild(augChips);
      container.appendChild(augRow);

      // Cost range
      const costRow = document.createElement('div');
      costRow.className = 'filter-row';
      const costLabel = document.createElement('span');
      costLabel.className = 'filter-label';
      costLabel.textContent = 'Cost';
      costRow.appendChild(costLabel);
      costMin = document.createElement('input');
      costMin.type = 'number';
      costMin.className = 'cost-input';
      costMin.placeholder = 'Min';
      costMin.oninput = () => { filters.costMin = costMin.value; render(); };
      costRow.appendChild(costMin);
      const sep = document.createElement('span');
      sep.className = 'cost-sep';
      sep.textContent = '—';
      costRow.appendChild(sep);
      costMax = document.createElement('input');
      costMax.type = 'number';
      costMax.className = 'cost-input';
      costMax.placeholder = 'Max';
      costMax.oninput = () => { filters.costMax = costMax.value; render(); };
      costRow.appendChild(costMax);
      container.appendChild(costRow);

      rebuildFilters();
    }

    setupFilters();
    render();
  })
  .catch(err => {
    document.getElementById('ldonContent').innerHTML = '<p class="aa-empty">Failed to load LDoN gear data: ' + err.message + '</p>';
  });
</script>
</body>
</html>
