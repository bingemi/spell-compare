<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Froggy Locations</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div class="container">

  <nav class="nav-bar">
    <a class="nav-link" href="aa-tracker.html"><i class="ti ti-arrow-up-circle" aria-hidden="true"></i>AA Tracker</a>
    <a class="nav-link" href="aa-reference.html"><i class="ti ti-book" aria-hidden="true"></i>AA Reference</a>
    <a class="nav-link" href="index.html"><i class="ti ti-wand" aria-hidden="true"></i>Missing Spells</a>
    <div class="nav-dropdown">
      <button class="nav-dropdown-btn has-active" id="moreDropdown"><i class="ti ti-dots" aria-hidden="true"></i>More<i class="ti ti-chevron-down" aria-hidden="true"></i></button>
      <div class="nav-dropdown-menu" id="moreMenu">
        <a class="active" href="froggy.html"><i class="ti ti-map-pin" aria-hidden="true"></i>Froggy Locations</a>
        <a href="augments.html"><i class="ti ti-diamond" aria-hidden="true"></i>Augments</a>
        <a href="attack-cap.html"><i class="ti ti-sword" aria-hidden="true"></i>Attack Cap</a>
        <a href="raid-targets.html"><i class="ti ti-skull" aria-hidden="true"></i>Raid Targets</a>
        <a href="ldon.html"><i class="ti ti-backpack" aria-hidden="true"></i>LDoN Gear</a>
      </div>
    </div>
  </nav>
  <script>
  document.getElementById('moreDropdown').addEventListener('click', function(e) {
    e.stopPropagation();
    var menu = document.getElementById('moreMenu');
    var open = menu.classList.toggle('open');
    this.classList.toggle('open', open);
  });
  document.addEventListener('click', function() {
    document.getElementById('moreMenu').classList.remove('open');
    document.getElementById('moreDropdown').classList.remove('open');
  });
  </script>

  <h1><i class="ti ti-map-pin" aria-hidden="true" style="font-size:20px;vertical-align:-2px;margin-right:6px"></i>Froggy Locations</h1>
  <p class="subtitle">Discover where Froggy is hiding</p>
  <div id="froggyContent"></div>

</div>
<script>
function loadFroggyLocations() {
  const el = document.getElementById('froggyContent');
  if (el.dataset.loaded) return;
  fetch('reference/froggy/froggy-locations.json')
    .then(r => { if (!r.ok) throw new Error('HTTP ' + r.status); return r.json(); })
    .then(data => {
      el.innerHTML = Object.entries(data).map(([zone, locations]) =>
        `<div class="card">
          <div class="exp-group-name">${zone}</div>
          ${locations.map(l => `<div class="spell-row"><span class="spell-name">${l}</span></div>`).join('')}
        </div>`
      ).join('');
      el.dataset.loaded = '1';
    })
    .catch(err => { el.innerHTML = '<div class="card"><p class="no-issues">Failed to load: ' + err.message + '</p></div>'; });
}
loadFroggyLocations();
</script>
</body>
</html>
