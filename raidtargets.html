<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raid Targets Tracker</title>
    <!-- Link to your existing style.css here -->
    <link rel="stylesheet" href="style.css"> 
    <style>
        /* Basic styles to ensure the tabs and tables look right */
        .era-tabs { margin-bottom: 20px; display: flex; gap: 5px; flex-wrap: wrap; }
        .era-tab { padding: 10px 15px; cursor: pointer; background: #eee; border: 1px solid #ccc; border-radius: 4px; }
        .era-tab.active { background: #007bff; color: white; border-color: #007bff; }
        
        table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #ddd; }
        th { background-color: #f8f9fa; }
        
        .controls { margin-bottom: 20px; display: flex; gap: 10px; align-items: center; }
        .btn { padding: 8px 12px; cursor: pointer; background: #28a745; color: white; border: none; border-radius: 4px; }
        .btn-export { background: #17a2b8; }
    </style>
</head>
<body>

    <!-- Assuming you have a main nav like this from your other pages -->
    <nav class="main-nav">
        <a href="index.html">Home</a>
        <a href="aa-tracker.html">AA Tracker</a>
        <a href="augments.html">Augments</a>
        <a href="froggy.html">Froggy</a>
        <a href="raid-targets.html" class="active">Raid Targets</a>
    </nav>

    <main>
        <h1>Raid Targets Tracker</h1>
        
        <div class="controls">
            <button class="btn btn-export" onclick="exportData()">Export Data</button>
            <input type="file" id="importFile" accept=".json" style="display: none;" onchange="importData(event)">
            <button class="btn" onclick="document.getElementById('importFile').click()">Import Data</button>
            <span id="save-status" style="color: green; display: none;">Saved!</span>
        </div>

        <!-- Sub-tabs for Eras will be injected here -->
        <div id="era-tabs-container" class="era-tabs"></div>

        <!-- The table listing targets will be injected here -->
        <div id="target-list-container"></div>
    </main>

    <script>
        // 1. Your Data Structure (Easily editable array of objects)
        const raidData = {
            "Classic": [
                { id: "c1", target: "Lord Nagafen", zone: "Solusek B" },
                { id: "c2", target: "Lady Vox", zone: "Permafrost" },
                { id: "c3", target: "Phinigel Autropos", zone: "Kedge Keep" },
                { id: "c4", target: "Master Yael", zone: "The Hole" },
                { id: "c5", target: "Maestro of Rancor", zone: "Plane of Hate" },
                { id: "c6", target: "Innoruuk", zone: "Plane of Hate" },
                { id: "c7", target: "Sister of the Spire", zone: "Plane of Sky" },
                { id: "c8", target: "The Spiroc Lord", zone: "Plane of Sky" },
                { id: "c9", target: "Keeper of Souls", zone: "Plane of Sky" },
                { id: "c10", target: "Eye of Veeshan", zone: "Plane of Sky" },
                { id: "c11", target: "Fright", zone: "Plane of Fear" },
                { id: "c12", target: "Dread", zone: "Plane of Fear" },
                { id: "c13", target: "Terror", zone: "Plane of Fear" },
                { id: "c14", target: "Dracoliche", zone: "Plane of Fear" },
                { id: "c15", target: "Cazic Thule", zone: "Plane of Fear" }
            ],
            "Kunark": [
                { id: "k1", target: "Venril Sathir", zone: "Karnor's Castle" },
                { id: "k2", target: "Overking Bathezid", zone: "Chardok" },
                { id: "k3", target: "Queen Velzul", zone: "Chardok" },
                { id: "k4", target: "Gorenair", zone: "The Dreadlands" },
                { id: "k5", target: "Severilous", zone: "Emerald Jungle" },
                { id: "k6", target: "Talendor", zone: "Skyfire Mountains" },
                { id: "k7", target: "Trakanon", zone: "Old Sebilis" },
                { id: "k8", target: "Hoshkar", zone: "Veeshan's Peak" },
                { id: "k9", target: "Xygoz", zone: "Veeshan's Peak" },
                { id: "k10", target: "Druushk", zone: "Veeshan's Peak" },
                { id: "k11", target: "Nexona", zone: "Veeshan's Peak" },
                { id: "k12", target: "Silverwing", zone: "Veeshan's Peak" },
                { id: "k13", target: "Phara Dar", zone: "Veeshan's Peak" }
            ],
            "Velious": [], 
            "Luclin": [],
            "Planes of Power": [],
            "Gates of Discord": [],
            "Omens of War": []
        };

        let currentEra = "Classic";
        let killedTargets = JSON.parse(localStorage.getItem('eqRaidTracker')) || {};

        // 2. Render the Sub-Tabs
        function renderTabs() {
            const container = document.getElementById('era-tabs-container');
            container.innerHTML = '';
            
            Object.keys(raidData).forEach(era => {
                const button = document.createElement('button');
                button.className = `era-tab ${era === currentEra ? 'active' : ''}`;
                button.textContent = era;
                button.onclick = () => {
                    currentEra = era;
                    renderTabs();
                    renderTable();
                };
                container.appendChild(button);
            });
        }

        // 3. Render the Data Table for the selected Era
        function renderTable() {
            const container = document.getElementById('target-list-container');
            const targets = raidData[currentEra];

            if (targets.length === 0) {
                container.innerHTML = '<p>No targets added for this era yet!</p>';
                return;
            }

            let html = `
                <table>
                    <thead>
                        <tr>
                            <th>Killed</th>
                            <th>Target Name</th>
                            <th>Zone</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            targets.forEach(mob => {
                const isChecked = killedTargets[mob.id] ? 'checked' : '';
                html += `
                    <tr>
                        <td>
                            <input type="checkbox" id="${mob.id}" ${isChecked} onchange="toggleKill('${mob.id}')">
                        </td>
                        <td><label for="${mob.id}">${mob.target}</label></td>
                        <td>${mob.zone}</td>
                    </tr>
                `;
            });

            html += `</tbody></table>`;
            container.innerHTML = html;
        }

        // 4. Handle Checking/Unchecking and Saving
        function toggleKill(id) {
            killedTargets[id] = !killedTargets[id];
            localStorage.setItem('eqRaidTracker', JSON.stringify(killedTargets));
            showSaveStatus();
        }

        function showSaveStatus() {
            const status = document.getElementById('save-status');
            status.style.display = 'inline';
            setTimeout(() => status.style.display = 'none', 2000);
        }

        // 5. Export Functionality
        function exportData() {
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(killedTargets));
            const downloadAnchorNode = document.createElement('a');
            downloadAnchorNode.setAttribute("href", dataStr);
            downloadAnchorNode.setAttribute("download", "raid_tracker_export.json");
            document.body.appendChild(downloadAnchorNode);
            downloadAnchorNode.click();
            downloadAnchorNode.remove();
        }

        // 6. Import Functionality
        function importData(event) {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedData = JSON.parse(e.target.result);
                    killedTargets = importedData;
                    localStorage.setItem('eqRaidTracker', JSON.stringify(killedTargets));
                    renderTable(); // Refresh UI
                    alert('Data imported successfully!');
                } catch (err) {
                    alert('Error parsing JSON file. Please ensure it is a valid export.');
                }
            };
            reader.readAsText(file);
            // Reset input so the same file can be selected again if needed
            event.target.value = '';
        }

        // Initialize the page
        renderTabs();
        renderTable();

    </script>
</body>
</html>
